services:
  juice-shop:
    image: bkimminich/juice-shop
    container_name: juice-shop
    ports:
      - "127.0.0.1:3000:3000"

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap-scanner
    volumes:
      - ./reports:/zap/wrk:rw
    depends_on:
      - juice-shop
    command: >
      zap-baseline.py
      -t http://juice-shop:3000
      -r zap_baseline_report.html
      -I